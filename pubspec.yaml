name: hidden_ai_app
description: Hidden AI — bleeding-edge tech, news, papers and code with AI-powered explanations. Personalized by your profession.
publish_to: 'none' # This is the app, not a pub.dev package. Leave as-is.
# version: x.y.z+code — bump +code (versionCode) for every Play Store
# upload; bump x.y.z (versionName) for user-visible releases.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # For making API calls to arXiv
  http: ^1.6.0
  
  # For parsing the Atom XML response from arXiv
  xml: ^6.6.1

  # Basic Material Design icons
  cupertino_icons: ^1.0.6
  flutter_card_swiper: ^7.2.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  share_plus: ^12.0.1

  # Stage G: Auth + (later) comments/personalization storage.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  # Stage H: comments per post.
  cloud_firestore: ^5.4.4
  # Stage J: deep links (share URL opens app).
  app_links: ^6.3.2
  # Stage K: location-based breaking news.
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  # Stage Q: perceived performance.
  cached_network_image: ^3.4.1
  flutter_displaymode: ^0.6.0
  # Stage T: scheduled local notifications.
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - images/a.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "images/a.png"
  min_sdk_android: 21
  # Adaptive icon for Android 8+ — same image as foreground over a dark
  # background so it sits nicely in any launcher shape.
  adaptive_icon_background: "#03040A"
  adaptive_icon_foreground: "images/a.png"

# Native splash is a solid color ONLY (no logo). The Dart AnimatedLaunchScreen
# owns the logo reveal — putting the image here would show it twice.
# After editing, rerun: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#050B14"
  android: true
  ios: false
  android_12:
    color: "#050B14"
  fullscreen: true
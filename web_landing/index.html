<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden AI — Opening article…</title>
  <meta http-equiv="content-security-policy" content="default-src 'self' 'unsafe-inline'" />
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:linear-gradient(135deg,#05060F,#0B1A3F,#1C0B40);color:#fff;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{max-width:480px;text-align:center}
    h1{font-size:22px;margin:0 0 12px;font-weight:700}
    p{color:rgba(255,255,255,.6);margin:0 0 24px;font-size:15px;line-height:1.5}
    .spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);
          border-top-color:#5CDBD3;border-radius:50%;animation:s 1s linear infinite;
          margin:0 auto 20px}
    @keyframes s{to{transform:rotate(360deg)}}
    a{color:#5CDBD3;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <h1>Opening Hidden AI…</h1>
    <p id="msg">If the app doesn't open in a moment, we'll send you to the article.</p>
    <p><a id="manual" href="#">Tap here to open</a></p>
  </div>
  <script>
    (function () {
      function decode() {
        try {
          var p = new URLSearchParams(window.location.search).get('u');
          if (!p) return null;
          // url-safe base64 → standard base64 → utf8
          p = p.replace(/-/g, '+').replace(/_/g, '/');
          while (p.length % 4) p += '=';
          return decodeURIComponent(escape(atob(p)));
        } catch (e) { return null; }
      }
      var articleUrl = decode();
      var manual = document.getElementById('manual');
      if (articleUrl) {
        manual.href = articleUrl;
        manual.textContent = 'Continue to article';
        // App Link will intercept this navigation if the app is installed;
        // otherwise the browser follows it to the original article.
        setTimeout(function () { window.location.replace(articleUrl); }, 1500);
      } else {
        document.getElementById('msg').textContent =
          "We couldn't decode this link. It may be malformed.";
        manual.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
